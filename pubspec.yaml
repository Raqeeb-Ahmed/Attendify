name: attendenceapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.4.1
  google_sign_in: ^7.2.0
  geolocator: ^14.0.2
  http: ^1.2.1
  network_info_plus: ^7.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  cloud_firestore: ^6.3.0
  firebase_database: ^12.3.0
  intl: ^0.20.2
  workmanager: ^0.9.0
  flutter_local_notifications: ^18.0.0
  flutter_foreground_task: ^9.2.2
  app_settings: ^5.2.0
  connectivity_plus: ^6.1.3
  flutter_launcher_icons: ^0.14.4
  pdf: ^3.11.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  flutter_native_splash: ^2.4.0
  device_info_plus: ^11.0.0
  googleapis_auth: ^2.3.3
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/google_logo.png
    - assets/images/app_icon/icon.png
    - .env

  # App Icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon/icon.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/images/app_icon/icon.png"

flutter_native_splash:
  color: "#6366F1"
  image: "assets/images/app_icon/icon.png"
  android: true
  android_gravity: center
  ios_content_mode: center
  ios: true
  android_12:
    image: "assets/images/app_icon/icon.png"
    color: "#6366F1"
    android_gravity: center
    ios_content_mode: center